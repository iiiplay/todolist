<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .login-box {
            background: white;
            padding: 32px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 300px;
        }
        h2 { margin-bottom: 20px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 14px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 8px;
            cursor: pointer;
            border: 1px solid #888;
            border-radius: 4px;
            background: #f0f0f0;
        }
        button[type="submit"]:hover { background: #ddd; }
        .error { color: #c0392b; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>代辦事項 登入</h2>
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
            <p class="error">帳號或密碼錯誤，請再試一次。</p>
            {% endif %}
            <label for="id_username">帳號</label>
            {{ form.username }}
            <label for="id_password">密碼</label>
            {{ form.password }}
            <button type="submit">登入</button>
        </form>
    </div>
</body>
</html>
